name: work_sphere_ai
description: "AI-powered workforce management mobile app with face recognition and GPS tracking."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Navigation & Routing
  go_router: ^12.0.0
  
  # HTTP Client
  dio: ^5.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.1
  
  # Camera
  camera: ^0.10.5
  image_picker: ^1.0.4
  
  # Location
  geolocator: ^10.1.0
  
  # Image Processing
  image: ^4.1.4
  
  # UI
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  
  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
