
name: optiwork
description: OptiWork AI - Production-Grade Workforce Management App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  work_sphere_ai:
    path: ..

  # =========================
  # State Management
  # =========================
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # =========================
  # Networking & API
  # =========================
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  go_router: ^12.0.0

  # =========================
  # Authentication & Security
  # =========================
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0
  google_sign_in: ^6.2.1
  jwt_decoder: ^2.0.1

  # =========================
  # Camera & Image Processing
  # =========================
  camera: ^0.10.5
  image_picker: ^1.1.2
  image: ^4.2.0

  # =========================
  # ML / Face Detection
  # =========================
  google_mlkit_face_detection: ^0.11.0

  # =========================
  # Location & Maps
  # =========================
  geolocator: ^10.1.0
  google_maps_flutter: ^2.6.1

  # =========================
  # Charts & Data Visualization
  # =========================
  fl_chart: ^0.65.0

  # =========================
  # UI / Animation
  # =========================
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  rive: ^0.13.4

  # =========================
  # Material Design
  # =========================
  google_fonts: ^6.2.1
  dynamic_color: ^1.7.0

  # =========================
  # Firebase
  # =========================
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1
  firebase_analytics: ^11.0.1

  # =========================
  # Notifications
  # =========================
  flutter_local_notifications: ^17.2.1

  # =========================
  # Local Database & Storage
  # =========================
  sqflite: ^2.3.3+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # =========================
  # File System
  # =========================
  path: ^1.9.0
  path_provider: ^2.1.3

  # =========================
  # Documents & Sharing
  # =========================
  pdf: ^3.10.8
  share_plus: ^12.0.2

  # =========================
  # Utilities
  # =========================
  intl: ^0.20.2
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0

  # =========================
  # Analytics & Monitoring
  # =========================
  mixpanel_flutter: ^2.3.0
  sentry_flutter: ^8.2.0

  # =========================
  # Logging
  # =========================
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # =========================
  # Code Generation
  # =========================
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.2
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

  # =========================
  # Testing
  # =========================
  mocktail: ^1.0.3
  

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

